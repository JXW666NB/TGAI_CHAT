name: Build TG CHAT APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/tlstudio.keystore
            echo "storeFile=app/tlstudio.keystore" > android/key.properties
            echo "keyAlias=tgchat" >> android/key.properties
            echo "keyPassword=tlstudio2026" >> android/key.properties
            echo "storePassword=tlstudio2026" >> android/key.properties
          fi

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Clean build
        run: flutter clean

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tg-chat-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
